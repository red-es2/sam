<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Aericore</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="A violet and white fire, minimalist, cute..png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Header Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playwrite+DE+SAS:wght@100..400&display=swap" rel="stylesheet">

  <!-- Body / UI Font -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: stretch;

      /* 💜 Main violet with a tiny cold-blue undertone */
      background:
        radial-gradient(circle at top left,
          rgba(150, 90, 255, 0.28),
          transparent 34%),

        radial-gradient(circle at bottom right,
          rgba(135, 110, 255, 0.18),
          transparent 40%),

        radial-gradient(circle at center,
          rgba(120, 60, 255, 0.18),
          transparent 50%),

        radial-gradient(circle at top right,
          rgba(110, 150, 255, 0.08),
          transparent 38%),

        #000;

      color: #fff;
      overflow: hidden;
    }

    .splash {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      z-index: 2;
      opacity: 1;
      transition: opacity 0.8s ease;
    }

    .splash.fade-out {
      opacity: 0;
    }

    .logo {
      width: clamp(120px, 30vw, 260px);
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.15));
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .auth {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: 2rem 1.5rem calc(2rem + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .auth.show {
      opacity: 1;
    }

    .auth h1 {
      font-family: 'Playwrite DE SAS', sans-serif;
      font-weight: 900;
      text-align: center;
      letter-spacing: 2px;
      margin-top: 1rem;
    }

    .header-logo {
      width: 80px;
      margin: 0.5rem auto 0.8rem;
      display: block;
      opacity: 0.9;
    }

    .input-group {
      position: relative;
    }

    .input-group input {
      width: 100%;
      padding: 1rem;
      padding-right: 5.5rem;
      font-size: 1rem;
      border-radius: 18px;

      border: 2px solid rgba(190,170,255,0.22);

      background: rgba(150,110,255,0.05);
      color: #fff;
      outline: none;
      transition: all 0.2s ease;
    }

    .input-group input::placeholder {
      opacity: 0.6;
    }

    .input-group input:focus {
      border-color: rgba(190,200,255,0.5);
      background: rgba(150,120,255,0.08);
      box-shadow: 0 0 10px rgba(150,130,255,0.16);
    }

    .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);

      background: transparent;
      border: none;
      outline: none;

      color: #e2dcff;
      text-decoration: none;
      opacity: 0.7;

      font-size: 0.85rem;
      font-weight: 400;

      cursor: pointer;

      transition: opacity 0.2s ease;
    }

    .toggle-password:hover {
      opacity: 1;
    }

    .toggle-password:active {
      opacity: 1;
    }

    .forgot {
      text-align: right;
      font-size: 0.85rem;
      margin-top: -0.5rem;
    }

    .forgot a {
      color: #e2dcff;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s ease;
    }

    .forgot a:hover {
      opacity: 1;
    }

    .forgot a:active {
      opacity: 1;
    }

    .auth button.sign-in-btn {
      width: 100%;
      padding: 1rem;
      border-radius: 18px;

      /* 💜 Violet with tiny blue undertone */
      background: rgba(135,85,255,0.22);

      color: #d8c4ff;

      border: 2px solid rgba(180,160,255,0.45);

      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;

      box-shadow:
        0 0 8px rgba(160,140,255,0.24),
        0 0 18px rgba(140,150,255,0.1),
        0 0 28px rgba(180,120,255,0.1),
        inset 0 0 10px rgba(180,160,255,0.05);

      transition:
        border-color 0.25s ease,
        color 0.25s ease,
        box-shadow 0.3s ease,
        background 0.25s ease;
    }

    .auth button.sign-in-btn:hover {
      border-color: rgba(210,190,255,0.62);
      color: #f0e6ff;

      box-shadow:
        0 0 10px rgba(180,160,255,0.3),
        0 0 22px rgba(140,150,255,0.14),
        0 0 34px rgba(190,130,255,0.12),
        inset 0 0 12px rgba(190,170,255,0.06);
    }

    .auth button.sign-in-btn:active {
      border-color: rgba(225,210,255,0.72);
      color: #ffffff;

      box-shadow:
        0 0 12px rgba(190,170,255,0.36),
        0 0 26px rgba(140,150,255,0.16),
        0 0 38px rgba(200,140,255,0.14),
        inset 0 0 14px rgba(210,190,255,0.08);
    }

    .auth .extra {
      font-size: 0.9rem;
      text-align: center;
    }

    .auth .extra a {
      color: #e2dcff;
      text-decoration: none;
      display: inline-block;
      opacity: 0.7;
      transition: opacity 0.2s ease;
    }

    .auth .extra a:hover {
      opacity: 1;
    }

    .auth .extra a:active {
      opacity: 1;
    }

    @media (min-width: 768px) {
      body {
        align-items: center;
      }

      .auth {
        border-radius: 16px;
        background: rgba(150,120,255,0.04);
        border: 1px solid rgba(190,180,255,0.1);
        backdrop-filter: blur(10px);
        padding: 2rem;
      }
    }
  </style>
</head>

<body>
  <div class="splash" id="splash">
    <img src="A violet and white fire, minimalist, cute..png" class="logo" />
  </div>

  <div class="auth" id="auth">
    <h1>Aericore</h1>

    <img src="A violet and white fire, minimalist, cute..png" class="header-logo" />

    <div class="input-group">
      <input type="email" placeholder="Email">
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder="Password">

      <button
        type="button"
        class="toggle-password"
        onclick="togglePassword()"
      >
        Show
      </button>
    </div>

    <div class="forgot">
      <a href="#">Forgot password?</a>
    </div>

    <button class="sign-in-btn">Sign In</button>

    <div class="extra">
      <a href="#">Don't have an account? Sign up.</a>
    </div>
  </div>

  <script>
    const splash = document.getElementById('splash');
    const auth = document.getElementById('auth');

    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleButton = document.querySelector('.toggle-password');

      toggleButton.style.opacity = '0';

      setTimeout(() => {
        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          toggleButton.textContent = 'Hide';
        } else {
          passwordInput.type = 'password';
          toggleButton.textContent = 'Show';
        }

        toggleButton.style.opacity = '0.7';
      }, 120);
    }

    setTimeout(() => {
      splash.classList.add('fade-out');

      setTimeout(() => {
        splash.style.display = 'none';
        auth.classList.add('show');
      }, 800);

    }, 2000);
  </script>
</body>
</html>
